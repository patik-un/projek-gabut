name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      upload_logs:
        description: Upload build logs
        type: boolean
        default: true
  push:
    branches:
      - main
      - master

jobs:
  build-windows-installer:
    name: Build NSIS installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show build tools
        shell: pwsh
        run: |
          python --version
          node --version
          npm --version
          rustc --version
          cargo --version

      - name: Create backend virtual environment
        shell: pwsh
        run: |
          python -m venv backend\.venv
          backend\.venv\Scripts\python.exe -m pip install --upgrade pip
          backend\.venv\Scripts\python.exe -m pip install -r backend\requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Restore Google OAuth client secrets
        shell: pwsh
        env:
          GOOGLE_CLIENT_SECRETS_JSON: ${{ secrets.GOOGLE_CLIENT_SECRETS_JSON }}
        run: |
          if ($env:GOOGLE_CLIENT_SECRETS_JSON) {
            New-Item -ItemType Directory -Force backend\auth | Out-Null
            $env:GOOGLE_CLIENT_SECRETS_JSON | Set-Content -Path backend\auth\client_secrets.json -Encoding utf8
            Write-Host "Google OAuth client secrets restored."
          } else {
            Write-Host "GOOGLE_CLIENT_SECRETS_JSON is empty; Drive login will need secrets supplied another way."
          }

      - name: Build Windows installer
        working-directory: frontend
        shell: pwsh
        run: |
          npm run tauri build -- --bundles nsis 2>&1 | Tee-Object -FilePath windows-build.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: event-booth-studio-windows-installer
          path: frontend/src-tauri/target/release/bundle/nsis/**/*.exe
          if-no-files-found: error

      - name: Upload build logs
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.upload_logs) }}
        uses: actions/upload-artifact@v4
        with:
          name: event-booth-studio-windows-build-logs
          path: |
            frontend/windows-build.log
            frontend/src-tauri/target/pyinstaller-build/**/warn-*.txt
            frontend/src-tauri/target/pyinstaller-build/**/*.html
          if-no-files-found: ignore
